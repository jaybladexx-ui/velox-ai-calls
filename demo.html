<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Talk to Riley</title>

    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        background: #0b1220;
        color: #e5e7eb;
        min-height: 100vh;
        display: grid;
        place-items: center;
      }
      .card {
        width: min(820px, calc(100% - 32px));
        background: rgba(17, 24, 39, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      }
      h1 {
        margin: 0 0 10px 0;
        font-size: 28px;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        color: #cbd5e1;
        line-height: 1.5;
      }
      code {
        background: rgba(255, 255, 255, 0.08);
        padding: 2px 6px;
        border-radius: 8px;
      }
    </style>

    <!-- Official Vapi embed code (Web Widget) -->
    <script
      src="https://cdn.jsdelivr.net/gh/VapiAI/html-script-tag@latest/dist/assets/index.js"
      defer
      async
    ></script>
  </head>

  <body>
    <div class="card">
      <h1>Talk to Riley</h1>
      <p>
        Use the <strong>web call button</strong> (bottom-right) to talk to Riley directly in your browser.
      </p>
      <p style="margin-top: 12px">
        Public key: <code>3b5ed616-1176-40cc-aeba-fdfa8de3124c</code><br />
        Assistant ID: <code>043e1008-3473-4173-a04e-be0a67828d62</code>
      </p>
    </div>

    <script>
      window.addEventListener("load", () => {
        window.vapiSDK.run({
          apiKey: "3b5ed616-1176-40cc-aeba-fdfa8de3124c",
          assistant: "043e1008-3473-4173-a04e-be0a67828d62",
          config: {
            position: "bottom-right",
            theme: {
              primary: "#111827",
              secondary: "#ffffff",
            },
          },
        });
      });
    </script>
  </body>
</html>
